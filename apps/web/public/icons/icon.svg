<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Sudoku 2026">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.55" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- board panel -->
  <rect x="116" y="116" width="280" height="280" rx="36" fill="#ffffff" fill-opacity="0.10"
        stroke="#ffffff" stroke-opacity="0.95" stroke-width="10"/>
  <!-- inner grid lines (3x3) -->
  <g stroke="#ffffff" stroke-opacity="0.75" stroke-width="6" stroke-linecap="round">
    <line x1="209.3" y1="126" x2="209.3" y2="386"/>
    <line x1="302.6" y1="126" x2="302.6" y2="386"/>
    <line x1="126" y1="209.3" x2="386" y2="209.3"/>
    <line x1="126" y1="302.6" x2="386" y2="302.6"/>
  </g>
  <!-- accent cell -->
  <rect x="302.6" y="116" width="93.4" height="93.4" rx="14" fill="#fbbf24" fill-opacity="0.95"/>
  <!-- digits -->
  <g fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="800" text-anchor="middle">
    <text x="162.6" y="190" font-size="74">5</text>
    <text x="256"   y="283" font-size="74">7</text>
    <text x="349.3" y="376" font-size="74">2</text>
  </g>
  <text x="349.3" y="190" font-size="74" fill="#1e1b4b" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="800" text-anchor="middle">9</text>
</svg>
