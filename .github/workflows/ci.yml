name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first so packages/core/dist (its .d.ts) exists before the apps
      # type-check against @sudoku-2026/core.
      - run: pnpm build
      - run: pnpm type-check
      - run: pnpm lint
      - run: pnpm test
