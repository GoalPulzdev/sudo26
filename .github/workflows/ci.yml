name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: type-check core
        if: always()
        run: pnpm --filter @sudoku-2026/core type-check
      - name: type-check web
        if: always()
        run: pnpm --filter @sudoku-2026/web type-check
      - name: type-check mobile
        if: always()
        run: pnpm --filter @sudoku-2026/mobile type-check
      - name: lint
        if: always()
        run: pnpm lint
      - name: test
        if: always()
        run: pnpm test
      - name: build
        if: always()
        run: pnpm build
